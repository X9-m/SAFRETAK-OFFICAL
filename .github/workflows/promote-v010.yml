name: Promote SAFRETAK v0.1.0

on:
  push:
    paths:
      - release-v010.trigger

permissions:
  contents: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Rebuild verified clean source
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin release-v0.1-clean-bootstrap

          : > /tmp/safretak-v010.b64
          for file in $(git ls-tree -r --name-only origin/release-v0.1-clean-bootstrap bootstrap | grep -E '^bootstrap/part-[0-9]{2}\.b64$' | sort); do
            git show "origin/release-v0.1-clean-bootstrap:${file}" >> /tmp/safretak-v010.b64
          done

          base64 --decode /tmp/safretak-v010.b64 > /tmp/safretak-v0.1.0.tar.xz
          echo "b9bfb6b4b0b2d5b682adaa623e9232d539feae4bb004ad3441cec98a4a11e6c6  /tmp/safretak-v0.1.0.tar.xz" | sha256sum --check --strict

          mkdir -p /tmp/safretak-source
          tar -xJf /tmp/safretak-v0.1.0.tar.xz -C /tmp/safretak-source

          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -a /tmp/safretak-source/. .

          test "$(node -p "require('./package.json').version")" = "0.1.0"
          test -f src/App.tsx
          test -f src/components/AppImage.tsx
          test -f scripts/prepare-media.mjs

      - name: Publish clean source to main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "SAFRETAK Release Bot"
          git config user.email "actions@users.noreply.github.com"
          git add -A
          git commit -m "release: SAFRETAK v0.1.0 clean source"
          git push origin HEAD:main
